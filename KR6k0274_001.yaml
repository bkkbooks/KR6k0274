body:
  text: 沙門弘一撰目録事鈔序文科一標宗顯德篇科三篇聚名報篇科四隨戒釋相篇科戒相略六盜戒科八持犯方軌篇科十懺六聚法篇略科十三沙彌別行篇略科十四戒疏諸篇方便章科十五持犯義章科十六波羅夷約義以明章科十七淫戒犯緣闕緣章科十九制廣教五意章科十九境想義門章科二十大盜戒科二十大殺戒犯緣闕緣章科二十二大妄語戒犯緣闕緣章科二十三僧殘義門持犯方軌章科二十三捨墮義門持犯方軌章科二十三單提義門持犯方軌章科二十三提舍義門持犯方軌章科二十四衆學義門持犯方軌章科二十四業疏俗人受法章科二十五出家宗致章科二十六戒體章科二十七懺六聚法篇略科三十一行事鈔科別録第一冊行事鈔序文科接後記號初通敘撰述緣起初略歎戒德以標宗二統括諸篇大綱二廣敘弘傳以生起初正像弘傳三總示所詮行相二像季弘傳初敘昔澆訛初通明兩土二別示此方初總明傳教之失初標其自任二列其所失三結示難易二別彰講解之過初斥學解初通敘局執二明今述作初通敘興懷二列示乖諍二別示文體初引用取捨三結歎難能二述作體勢二嗟撰集初別斥初疏鈔乖宗三統會成異宗二總斥二義集繁闕三勒卷分篇初約文勒卷初能詮三卷初遮異說二示所詮三位二示今意二以類分篇初敘意三指所闕二列名二統括諸篇大綱初敘意生起二分門別示初第一門序教興意三總結指廣二第二門制教輕重意三第三門對事約教判處意四第四門用諸部文意五第五門文義決通意六第六門教所詮意七第七門道俗七部立教通局意八第八門僧尼二部行事通塞意九第九門下三衆隨行異同意十第十門明鈔者引用正文去濫傳真科酌意初第一門初薩婆多部二曇無德部初標舉二正明初通明教興初大慈愍物意初據論顯意二引律證成二對異外道意初敘本制意二據律證成三懸被異宗意初總約羣宗顯意二就當宗以辨初指前標後二略引二部證成三結指二約律證明初敘廣總標二位分別釋初正明別意初遮性往分初總示通局二別明緩急初正明初性戒二開制往徵初標舉二引證二遮戒三報有強弱二引文示初未來教四機悟不同三明互融二在世教五事法相對二結顯總意初正明二引證二第二門初標舉二正明初敘教難裁二尋文可究初敘意標舉二約文別列三總前結示三第三門初標舉二正明初敘古初通示乖競二推究所由三勸學離過二顯今初正判今宗二更示分齊初敘妄判二示通準四第四門初標舉二正明初敘律分宗初本同計異二明今取用二隨計分宗三別異之相初正取諸部初立宗標示初明取捨二引論為準二示合法三正明取意初敘意標示三斥偏局二舉例取文四檢閲無濫三取用之法初取相關二兼用六師初列示諸見初總標二明用他事二顯今所宗二列示三示兩存五第五門初標舉三通結二正明初通敘立教之源二別明律藏之闕初敘昔遺闕六第六門初標舉二顯今決通二正明初敘意通標初標敘能詮二別示諸例二正辨所詮初通持犯三評量可否初明不能初正明二別持犯二引證七第七門初標舉二示堪能初正明二正明初出教體初敘意總標二引證二列示二教初化教二示所判初示宗二行教二正判初業分內外八第八門初標舉三徵意二罪異單重二正明初正明通塞初明通九第九門初標舉二結意指廣二明塞初十誦二正明初二衆沙彌初明同法二了論二辨異法二式叉摩那初示同行二指別行十第十門初標分二列示初引用正經初明三藏正教初總標二別釋初小乘律論三結略二大小乘經論二示諸師異執初標舉二世中僞經初標章二引示二列示三結指三結斥初敘刪簡三總結指廣三鈔興本意初標舉二指餘義二正明初標示名義三明不具三總示所詮行相初約行判文初總示二謙己伸懷四示所為二示難離過二別對三正示本意五遮妄增三結略伸勸三雙結終第二次録稿行事鈔標宗顯德篇科接後記號初篇目二本文初先出宗體二引文顯德初敘宗勸學初約喻歎教二就人勸持初明順章以顯德二敘不學以彰非初明愚教二正明宗體初示意三舉興替以激勸二彰過失二顯相初先敘領受初正示得失二結誥用心二徵釋相狀初標列二隨釋初戒法初示相二彰名三明志二戒體初標指彼此三戒行二正示心相四戒相二引文顯德初結前生起二廣引誠證初標章指廣二依位引明初順戒住持初分科二隨釋初約化教初標分二違戒滅法二就制門二別釋初小乘經初標二釋初人法相似義二萬行所歸義二小乘論初標三生成住持義二釋初成實論二解脫道論三大乘經初標三毗婆沙論初總列二釋初華嚴經二別解二大集經三覆釋三薩遮尼犍經四月燈三昧經五𣵀槃經四大乘論初標六華嚴經二釋初智度論二地持論二就制門初標三十住婆沙論二別釋初律本初標示二正引初僧祇律初明了論二四分律二薩婆多論二律論初標示三十誦律三善見論二正引初明功能四五百問論二顯祕勝二違戒滅法初牒章總示二廣引諸文初破戒滅法初十誦律初五種滅法二四分律二五種怖畏二廢學訶責初十誦律二雜含經三現未衰惡初中含經二𣵀槃經三摩耶經四智度論初引前破戒文二引後遮疑問初正引問答四不學滅法五四分律二正斥非顯意終行事鈔篇聚名報篇科接後記號初篇目二本文初敘總意初位尊所由二違順得失三愚教致損四立篇本意二開章釋初分科二隨釋初先明戒護初推釋所由二引論廣示初標示初波羅夷二正明篇聚初牒章分位二列釋二僧伽婆尸沙二依位別釋三結勸三偷蘭遮四波逸提初明篇聚初正明初標列五提舍尼二問答二別